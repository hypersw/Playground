<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Avatar Forest</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      /* dvh handles mobile browser chrome; vh is fallback */
      width: 100%;
      height: 100vh;
      height: 100dvh;
      position: fixed;
      inset: 0;
      /* Prevent pull-to-refresh and overscroll bounce on mobile */
      overscroll-behavior: none;
      touch-action: none;
    }
    #game-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
